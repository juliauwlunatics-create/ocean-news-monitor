name: Ocean News Monitor

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: node ocean-news-monitor.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SLACK_WEBHOOK_URL_OCEAN: ${{ secrets.SLACK_WEBHOOK_URL_OCEAN }}
